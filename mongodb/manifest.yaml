apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    env: dev 
spec:
  selector:
      project: roboshop
      component: mongodb
      env: dev 
  clusterIP: None
  ports:
  - port: 27017  # service port
    targetPort: 27017  # container port     
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb 
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      env: dev 
      
  serviceName: "mongodb-headless"
  replicas: 3
  #minReadySeconds: 10 # by default is 0
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        env: dev 
      
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mongodb 
        image: subbukola541/mongodb:1.0
        volumeMounts:
        - name: mongodb 
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb 
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    env: dev 
spec:
  selector:
      project: roboshop
      component: mongodb
      env: dev 
  clusterIP: None
  ports:
  - port: 27017  # service port
    targetPort: 27017  # container port 